name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             picture-password-${VERSION}.apk

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF_NAME}" ]; then
            CHANGELOG=$(git log --oneline --no-decorate HEAD~10..HEAD)
          else
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..${GITHUB_REF_NAME})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Picture Password ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            Download the APK and install on your Android device (Android 9+).

            > ⚠️ This is an unsigned release APK. You may need to enable "Install from unknown sources" in your device settings.
          files: picture-password-*.apk
          draft: false
          prerelease: false
