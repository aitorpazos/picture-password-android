name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
          fi
        # Falls back to repo keystore if secret not set

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APKs (per-ABI + universal)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'REDACTED' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'picture-password' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'REDACTED' }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APK_DIR=app/build/outputs/apk/release

          # Map ABI filter names to friendly names
          for apk in ${APK_DIR}/app-*-release.apk; do
            filename=$(basename "$apk")
            if echo "$filename" | grep -q "universal"; then
              cp "$apk" "picture-password-${VERSION}-universal.apk"
            elif echo "$filename" | grep -q "arm64"; then
              cp "$apk" "picture-password-${VERSION}-arm64-v8a.apk"
            elif echo "$filename" | grep -q "armeabi"; then
              cp "$apk" "picture-password-${VERSION}-armeabi-v7a.apk"
            elif echo "$filename" | grep -q "x86_64"; then
              cp "$apk" "picture-password-${VERSION}-x86_64.apk"
            elif echo "$filename" | grep -q "x86"; then
              cp "$apk" "picture-password-${VERSION}-x86.apk"
            fi
          done

          ls -la picture-password-*.apk

      - name: Generate changelog
        id: changelog
        run: |
          TAG_COUNT=$(git tag --sort=-version:refname | wc -l | tr -d ' ')
          if [ "$TAG_COUNT" -le 1 ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..${GITHUB_REF_NAME})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Picture Password ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            | APK | Architecture | Devices |
            |-----|-------------|---------|
            | `arm64-v8a` | 64-bit ARM | **Most modern phones** (Pixel, Samsung Galaxy S/A series, OnePlus, etc.) |
            | `armeabi-v7a` | 32-bit ARM | Older phones |
            | `x86_64` | 64-bit x86 | Emulators, Chromebooks |
            | `x86` | 32-bit x86 | Older emulators |
            | `universal` | All architectures | Works everywhere (larger file) |

            > 💡 **Not sure which to pick?** Download `arm64-v8a` for most modern Android phones, or `universal` if unsure.

            ## Installation

            Download the APK for your device architecture and install (Android 9+).
            You may need to enable "Install from unknown sources" in your device settings.
          files: picture-password-*.apk
          draft: false
          prerelease: false
